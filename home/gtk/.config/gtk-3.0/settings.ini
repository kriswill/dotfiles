[Settings]
gtk-theme-name=adw-gtk3-dark
gtk-icon-theme-name=breeze-dark
gtk-font-name=Adwaita Sans 11
gtk-cursor-theme-name=Adwaita
gtk-cursor-theme-size=48
gtk-toolbar-style=GTK_TOOLBAR_ICONS
gtk-toolbar-icon-size=GTK_ICON_SIZE_LARGE_TOOLBAR
gtk-button-images=0
gtk-menu-images=0
gtk-enable-event-sounds=1
gtk-enable-input-feedback-sounds=0
gtk-xft-antialias=1
gtk-xft-hinting=1
gtk-xft-hintstyle=hintslight
gtk-xft-rgba=rgb
gtk-application-prefer-dark-theme=1
# niri has no settings daemon / xdg-desktop-portal broadcasting a color-scheme,
# so GTK apps default to light. This tells GTK to use its built-in dark variant,
# which the gtk3 VCL plugin honors — letting LibreOffice's "Dark" theme render.
