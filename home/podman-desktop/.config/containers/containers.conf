[containers]
[engine]
env = []
# The official podman.io release binary (pkgs/podman.nix) drops the helper
# directory that nixpkgs' podman baked in via ldflags, so podman can no longer
# find its machine helpers on its own. Point it at the per-user profile bin,
# where the vfkit + gvproxy packages (users.users.k.packages) land — a stable
# path across rebuilds. Without this, `podman machine` cannot locate vfkit (the
# applehv VM) or gvproxy (user-mode networking).
helper_binaries_dir = ["/etc/profiles/per-user/k/bin"]

[machine]
# applehv = Apple Virtualization.framework (via the vfkit helper) — the stable,
# default podman machine backend on Apple Silicon.
# Previously "libkrun": nixpkgs' libkrun-efi build ships no EFI firmware, so krunkit
# fails to boot the VM ("can't find a firmware to load"). M1 has no nested-virt, so
# libkrun's GPU/nested features bought us nothing here anyway.
provider = "applehv"

[network]
[secrets]
[configmaps]
