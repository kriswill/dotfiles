[containers]
[engine]
env = []
# No helper_binaries_dir override needed: pkgs/podman.nix bundles vfkit + gvproxy
# into the podman package at $out/libexec/podman, which podman's compiled-in
# darwin default ("$BINDIR/../libexec/podman") searches automatically. See
# pkgs/podman.nix and modules/darwin/podman-desktop.nix (pathsToLink "/libexec").

[machine]
# applehv = Apple Virtualization.framework (via the vfkit helper) — the stable,
# default podman machine backend on Apple Silicon.
# Previously "libkrun": nixpkgs' libkrun-efi build ships no EFI firmware, so krunkit
# fails to boot the VM ("can't find a firmware to load"). M1 has no nested-virt, so
# libkrun's GPU/nested features bought us nothing here anyway.
provider = "applehv"

[network]
[secrets]
[configmaps]
