# Hyprland desktop wallpaper (hyprpaper daemon, launched from hyprland.lua).
#
# Same image and "fill" behaviour as the niri session, which spawns
#   swaybg -i ~/.config/niri/wallpaper.jpg -m fill
# The file is the repo-tracked wallpaper symlinked into ~/.config/niri, so both
# sessions stay in sync from one source.
#
# hyprpaper 0.8.x rewrote the config: the old flat `preload =` / `wallpaper = ,<path>`
# directives are silently ignored (the daemon reads the file but registers no
# target, so Hyprland's built-in default wallpaper shows through). Wallpapers are
# now declared in a `wallpaper { ... }` block:
#   - monitor   empty = fallback applied to every output
#   - path      the image; ~ and globbing are expanded
#   - fit_mode  cover (default) scales to fill, cropping overflow — matches swaybg -m fill
#               (other values: contain, tile, fill)

splash = false

wallpaper {
    monitor =
    path = ~/.config/niri/wallpaper.jpg
    fit_mode = cover
}
