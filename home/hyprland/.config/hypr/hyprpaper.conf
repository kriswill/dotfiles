# Hyprland desktop wallpaper (hyprpaper daemon, launched from hyprland.lua).
#
# Same image and "fill" behaviour as the niri session, which spawns
#   swaybg -i ~/.config/niri/wallpaper.jpg -m fill
# The file is the repo-tracked wallpaper symlinked into ~/.config/niri, so both
# sessions stay in sync from one source. hyprpaper has no "fill" mode keyword:
# `wallpaper = ,<path>` (empty monitor field = all outputs) defaults to
# cover/fill — scales to fill the output, cropping overflow — matching swaybg -m fill.

preload = ~/.config/niri/wallpaper.jpg
wallpaper = ,~/.config/niri/wallpaper.jpg

# One static wallpaper, set here at load — no need for the version splash overlay
# or the runtime IPC socket (we never switch wallpapers via `hyprctl hyprpaper`).
splash = false
ipc = off
