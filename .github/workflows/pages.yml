# Publish the knowledge/ graph viewer (okf viz) as public documentation on
# GitHub Pages: https://kris.net/dotfiles/ (account-level custom domain;
# kriswill.github.io/dotfiles redirects there).
# The page is a single self-contained HTML file, rebuilt from the bundle on
# every push — knowledge/viz.html itself stays gitignored.
name: pages

on:
  push:
    branches:
      - main
    paths:
      - "knowledge/**"
      - "flake.lock" # okf bumps arrive as lock updates (github:kriswill/okflight)
      - "okflight.toml"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # gitISO stamps each embedded file with its last-commit date

      # okf lives in the private kriswill/okflight repo; check it out at the
      # exact rev the flake.lock pins (read-only deploy key: OKFLIGHT_DEPLOY_KEY).
      - name: Read pinned okf rev
        id: okf
        run: echo "rev=$(jq -r '.nodes.okf.locked.rev' flake.lock)" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v7
        with:
          repository: kriswill/okflight
          ref: ${{ steps.okf.outputs.rev }}
          ssh-key: ${{ secrets.OKFLIGHT_DEPLOY_KEY }}
          path: okflight

      - uses: oven-sh/setup-bun@v2

      - name: Install viewer dependencies
        working-directory: okflight
        run: bun install --frozen-lockfile

      - name: Build viz.html
        run: bun okflight/okf.ts viz

      - name: Stage Pages artifact
        run: |
          mkdir -p dist
          cp knowledge/viz.html dist/index.html

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
